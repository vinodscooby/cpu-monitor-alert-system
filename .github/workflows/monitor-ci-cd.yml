name: CPU Monitor CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Security Scan
        run: |
          pip install bandit
          bandit -r app/ --severity-level high || echo "Bandit scan completed"

      - name: Build Docker Image
        run: docker build -t cpu-monitor-app:${{ github.sha }} .